<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Lunar Muhurta Synergy</title>
    <!-- Diagnostic script to catch white screen errors -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.innerHTML = '<div style="background:red; color:white; padding:10px; font-size:12px; z-index:9999; position:fixed; top:0; left:0; width:100%; word-break:break-all;"><strong>JS Error:</strong> ' + msg + '<br>At: ' + line + ':' + col + '</div>';
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        var overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.innerHTML = '<div style="background:orange; color:white; padding:10px; font-size:12px; z-index:9999; position:fixed; top:0; left:0; width:100%; word-break:break-all;"><strong>Promise Error:</strong> ' + event.reason + '</div>';
        }
      };
    </script>
  </head>
  <body>
    <div id="error-overlay" style="display:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      body { background: #0A0B10; margin: 0; padding: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </body>
</html>
